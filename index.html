<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediQueue AI – Smart Hospital Queue Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">MQ</div>
      <h2>MediQueue AI Portal</h2>
      <p>Smart Hospital Queue Management</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@hospital.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      <p>New Patient? <a href="register.html" class="btn-link">Create an Account</a></p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Logic -->
  <script type="module" src="js/login.js"></script>
</body>
</html>
