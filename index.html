<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediQueue AI – Smart Hospital Queue Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">MQ</div>
      <h2>MediQueue AI Portal</h2>
      <p>Smart Hospital Queue Management</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@hospital.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
        Sign In
      </button>
    </form>

    <div class="demo-login-divider" style="text-align: center; margin: 1.5rem 0 1rem 0; font-size: 0.85rem; color: var(--color-text-medium); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
      <span style="flex: 1; border-bottom: 1px solid var(--color-border);"></span>
      <span>Quick Demo Login</span>
      <span style="flex: 1; border-bottom: 1px solid var(--color-border);"></span>
    </div>

    <div class="demo-buttons" style="display: flex; gap: 0.75rem; margin-bottom: 1rem;">
      <button id="demo-doctor-btn" type="button" class="btn btn-secondary" style="flex: 1; padding: 0.5rem; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.25rem; border: 1px solid var(--color-border); border-radius: 6px; cursor: pointer; background: white; font-weight: 500;">
        <span class="material-icons-outlined" style="font-size: 1rem; color: var(--color-primary);">medical_services</span> Doctor
      </button>
      <button id="demo-patient-btn" type="button" class="btn btn-secondary" style="flex: 1; padding: 0.5rem; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.25rem; border: 1px solid var(--color-border); border-radius: 6px; cursor: pointer; background: white; font-weight: 500;">
        <span class="material-icons-outlined" style="font-size: 1rem; color: var(--color-primary);">person</span> Patient
      </button>
    </div>

    <div class="auth-footer">
      <p>New Patient? <a href="register.html" class="btn-link">Create an Account</a></p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Logic -->
  <script type="module" src="js/login.js"></script>
</body>
</html>
