<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediQueue AI – Smart Hospital Queue Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">MQ</div>
      <h2>MediQueue AI Portal</h2>
      <p>Smart Hospital Queue Management</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@hospital.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      <p>New Patient? <a href="register.html" class="btn-link">Create an Account</a></p>
    </div>

    <div style="margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--color-border); text-align: center;">
      <p style="font-size: 0.75rem; color: var(--color-text-medium); margin-bottom: 0.65rem; font-weight: 600;">⚡ Quick Demo Accounts (Pass: 123456)</p>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
        <button id="quick-doctor-btn" type="button" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.45rem;">
          🩺 doctor1@gmail.com
        </button>
        <button id="quick-patient-btn" type="button" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.45rem;">
          👤 patient1@gmail.com
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Logic -->
  <script type="module" src="js/login.js"></script>
</body>
</html>
